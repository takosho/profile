<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>田 光翔 — 自己紹介</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f5f5f0;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .name-en {
      font-size: 14px;
      color: #999;
      letter-spacing: 0.08em;
      margin-bottom: 32px;
    }

    .section {
      margin-bottom: 28px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #999;
      margin-bottom: 10px;
    }

    .hobbies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #f0eeff;
      color: #6c5ce7;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
    }

    .message {
      background: #fafafa;
      border-left: 3px solid #6c5ce7;
      padding: 14px 16px;
      border-radius: 0 8px 8px 0;
      font-size: 15px;
      line-height: 1.7;
      color: #444;
    }

    .resume-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding: 12px 20px;
      background: #6c5ce7;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.1s;
    }

    .resume-link:hover {
      background: #5a4bd1;
      transform: translateY(-1px);
    }

    .resume-link svg {
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- SVG Avatar -->
    <svg class="avatar" viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg">
      <!-- Background -->
      <circle cx="44" cy="44" r="44" fill="#dcd6f7"/>
      <!-- Body / torso -->
      <ellipse cx="44" cy="74" rx="22" ry="14" fill="#6c5ce7"/>
      <!-- Neck -->
      <rect x="39" y="54" width="10" height="10" rx="4" fill="#f0c5a0"/>
      <!-- Head -->
      <ellipse cx="44" cy="44" rx="18" ry="20" fill="#f0c5a0"/>
      <!-- Hair -->
      <ellipse cx="44" cy="30" rx="18" ry="10" fill="#2d2d2d"/>
      <rect x="26" y="30" width="36" height="8" fill="#2d2d2d"/>
      <!-- Eyes -->
      <ellipse cx="37" cy="44" rx="3" ry="3.5" fill="#fff"/>
      <ellipse cx="51" cy="44" rx="3" ry="3.5" fill="#fff"/>
      <circle cx="38" cy="44" r="1.8" fill="#2d2d2d"/>
      <circle cx="52" cy="44" r="1.8" fill="#2d2d2d"/>
      <!-- Eyebrows -->
      <path d="M34 39 Q37 37 40 39" stroke="#2d2d2d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M48 39 Q51 37 54 39" stroke="#2d2d2d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- Nose -->
      <path d="M44 47 Q42 50 44 51 Q46 50 44 47" stroke="#c9956e" stroke-width="1" fill="none" stroke-linecap="round"/>
      <!-- Mouth -->
      <path d="M40 55 Q44 58 48 55" stroke="#c06060" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>

    <div class="name">田 光翔</div>
    <div class="name-en">Ta Kousho</div>

    <div class="section">
      <div class="section-label">好きなこと</div>
      <div class="hobbies">
        <span class="tag">🥊 ボクシング</span>
        <span class="tag">✈️ 旅行</span>
        <span class="tag">☕ コーヒー</span>
        <span class="tag">📚 読書</span>
      </div>
    </div>

    <div class="section">
      <div class="section-label">一言メッセージ</div>
      <div class="message">
        愛知生まれ、フィリピン・オーストラリアを経て、現在は大阪在住。世界を渡り歩いた経験を活かしながら、日々挑戦し続けています。よろしくお願いします！
      </div>
    </div>

    <div class="section">
      <div class="section-label">詳細プロフィール</div>
      <a class="resume-link" href="resume.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        履歴書・経歴を見る
      </a>
    </div>

  </div>
</body>
</html>
